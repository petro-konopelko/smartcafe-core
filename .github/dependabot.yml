version: 2
updates:
  # Enable version updates for NuGet packages
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "nuget"
    reviewers:
      - "petro-konopelko"
    assignees:
      - "petro-konopelko"
    groups:
      # Aspire packages
      aspire:
        patterns:
          - "Aspire*"
      # Microsoft packages
      microsoft:
        patterns:
          - "Microsoft.*"
          - "System.*"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "petro-konopelko"
    assignees:
      - "petro-konopelko"
